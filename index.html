<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Junior School - Busula | Excellence in Education</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            scroll-behavior: smooth;
            background-color: #ffffff;
            color: #000000;
        }

        h1, h2, h3 {
            letter-spacing: -0.02em;
        }
        
        .font-display {
            font-family: 'Cormorant Garamond', Georgia, serif;
        }
        
        .editorial-text {
            font-family: 'Cormorant Garamond', Georgia, serif;
            line-height: 1.1;
        }

        .outline-text {
            -webkit-text-stroke: 1px rgba(0,0,0,0.2);
            color: transparent;
        }

        .luxury-card {
            background: #ffffff;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #8B0000;
        }

        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        .image-reveal {
            overflow: hidden;
            position: relative;
            background: #f5f5f5;
        }
        .image-reveal img {
            transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .image-reveal:hover img {
            transform: scale(1.05);
        }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body class="antialiased selection:bg-[#8B0000] selection:text-white">
    <div id="root">
      <p style="padding: 24px; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: #333;">Loading…</p>
    </div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
